spring:
  application:
    name: yt-clone-authservice
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_service
    username: postgres
    password: pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
server:
  port: 9090
  servlet:
    session:
      cookie:
        name: AUTHSESSIONID
